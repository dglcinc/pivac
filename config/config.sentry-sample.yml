# pivac.Sentry sample config — ROI coordinates set by --calibrate interactive
# session on 2026-03-22 against a 2560x1440 frame.  Run --debug to verify,
# then copy the pivac.Sentry block into /etc/pivac/config.yml.

pivac.Sentry:
  rtsp_url: "rtsp://USERNAME:PASSWORD@10.0.0.19:554/stream1"

  # How long to wait for the display to cycle through all modes (seconds)
  cycle_timeout: 15
  # Seconds between frame grabs during a cycle capture
  frame_interval: 2.5

  # LED brightness ratio: how much brighter a lit LED must be vs surrounding
  # panel background. 1.4 = 40% brighter. Works in IR and colour modes.
  led_ratio: 1.4

  # Bounding box of the LED digit glass in the full 2560x1440 frame.
  # Shifted 2px left of the raw click so that d0.x stays >= 0.
  display_roi:
    x: 1135
    y: 642
    w: 199
    h: 95

  # Each digit's bounding box, relative to display_roi.
  # Measured by clicking corners directly on the live frame.
  digit_positions:
    - {x:   0, y:  0, w:  64, h:  93}  # hundreds
    - {x:  62, y:  1, w:  65, h:  92}  # tens
    - {x: 125, y:  1, w:  71, h:  90}  # units

  # Centre pixel of each green LED indicator (right of display panel).
  leds:
    burner:            {x: 1355, y: 644}
    circ:              {x: 1355, y: 671}
    circ_aux:          {x: 1349, y: 698}
    thermostat_demand: {x: 1349, y: 723}

  # Centre pixel of each display-mode indicator light (bottom of panel).
  # Whichever is lit identifies what value the 3-digit display is showing.
  indicators:
    water_temp: {x: 1154, y: 755}
    air:        {x: 1209, y: 750}
    gas_input:  {x: 1262, y: 743}
    dhw_temp:   {x: 1316, y: 746}
