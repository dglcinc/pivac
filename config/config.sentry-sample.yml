# pivac.Sentry sample config — ROI coordinates set by --calibrate interactive
# session on 2026-03-23 against a 2560x1440 frame.  Run --debug to verify,
# then copy the pivac.Sentry block into /etc/pivac/config.yml.

pivac.Sentry:
  rtsp_url: "rtsp://USERNAME:PASSWORD@10.0.0.19:554/stream1"

  # How long to wait for the display to cycle through all modes (seconds)
  cycle_timeout: 15
  # Seconds between frame grabs during a cycle capture
  frame_interval: 2.5

  # LED brightness ratio: how much brighter a lit LED must be vs surrounding
  # panel background. 1.4 = 40% brighter. Works in IR and colour modes.
  led_ratio: 1.4

  # Perspective warp: 4 corners of the LED glass in the original 2560x1440 frame.
  # Order: TL -> TR -> BR -> BL
  # Digit positions below are relative to the de-skewed rectified display.
  display_warp:
    corners:
      - {x: 1156, y: 655}  # TL
      - {x: 1324, y: 647}  # TR
      - {x: 1313, y: 719}  # BR
      - {x: 1148, y: 730}  # BL
    dst_w: 168
    dst_h: 75

  # Each digit's bounding box, relative to the RECTIFIED (de-skewed) display.
  digit_positions:
    - {x:    1, y:    1, w:   39, h:   73}  # hundreds
    - {x:   62, y:    1, w:   41, h:   73}  # tens
    - {x:  124, y:    1, w:   43, h:   73}  # units

  # Centre pixel of each green LED indicator (right of display panel).
  # Coordinates are in the original full frame.
  leds:
    burner:            {x: 1355, y: 643}
    circ:              {x: 1352, y: 669}
    circ_aux:          {x: 1353, y: 696}
    thermostat_demand: {x: 1350, y: 723}

  # Centre pixel of each display-mode indicator light (bottom of panel).
  # Whichever is lit identifies what value the 3-digit display is showing.
  indicators:
    water_temp: {x: 1156, y: 755}
    air:        {x: 1210, y: 749}
    gas_input:  {x: 1261, y: 744}
    dhw_temp:   {x: 1316, y: 743}
