apiVersion: 1

groups:
  - orgId: 1
    name: pivac-data-freshness
    folder: pivac
    interval: 1m
    rules:
      - uid: redlink-stale
        title: RedLink data stale (>30m)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: bdxaqnfllu5fkf
            model:
              datasource:
                type: influxdb
                uid: bdxaqnfllu5fkf
              measurement: environment.inside.thermostat.MASTER_BR.temperature
              policy: default
              resultFormat: time_series
              orderByTime: ASC
              groupBy:
                - type: time
                  params:
                    - $__interval
                - type: fill
                  params:
                    - none
              select:
                - - type: field
                    params:
                      - value
                  - type: mean
                    params: []
              tags: []
              refId: A
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
              refId: B
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              refId: C
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 100
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
                  type: query
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "RedLink (Honeywell thermostat) data has been stale for >30m on MASTER_BR.temperature"
          runbook: "Check `journalctl -u pivac-redlink -n 100` for login-cooldown messages. PR #39 backoff auto-recovers within 30m on rate-limit lockouts. If lockout persists, the credentials may have been changed at mytotalconnectcomfort.com."
        labels:
          severity: warning
          source: redlink
        isPaused: false
        notification_settings:
          receiver: graph-bridge
